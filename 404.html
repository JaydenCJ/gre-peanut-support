<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>GRE Peanut — Page not found</title>
<meta name="description" content="That page doesn't exist. Head back to GRE Peanut support or the privacy policy." />
<meta name="robots" content="noindex" />
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#F7714E" />
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#1F1B26" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🥜</text></svg>" />
<link rel="icon" type="image/png" sizes="32x32" href="https://jaydencj.github.io/gre-peanut-support/favicon-32.png" />
<link rel="apple-touch-icon" href="https://jaydencj.github.io/gre-peanut-support/apple-touch-icon.png" />
<style>
  @font-face{font-family:'Fredoka';font-style:normal;font-weight:300 700;font-display:swap;
    src:url('https://jaydencj.github.io/gre-peanut-support/fonts/fredoka-latin.woff2') format('woff2')}
  @font-face{font-family:'Nunito';font-style:normal;font-weight:200 1000;font-display:swap;
    src:url('https://jaydencj.github.io/gre-peanut-support/fonts/nunito-latin.woff2') format('woff2')}
  :root{
    --coral:#F7714E; --coral-dark:#DE5733; --cream:#F8F6F1; --surface:#fff;
    --ink:#2D2A33; --ink2:#5C5768; --ink3:#6E687C; --line:#EBE6DC; --accent:#6E6CE6;
    --link:#B03E16; --btn:#B03E16; --btn-ink:#fff; --btn-hover:#96340F;
    color-scheme:light dark;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --cream:#1F1B26; --surface:#2A2532; --ink:#EDE9F2; --ink2:#CFC9DB; --ink3:#A59DB3;
      --line:#3A3444; --accent:#9D9BF0; --link:#FF9E7A; --btn:#F7714E; --btn-ink:#2D2A33; --btn-hover:#FF8A66;
    }
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--cream);color:var(--ink);
    font-family:Nunito,-apple-system,system-ui,sans-serif;line-height:1.6;
    -webkit-text-size-adjust:100%;text-size-adjust:100%}
  .wrap{max-width:720px;margin:0 auto;padding:0 22px;
    padding-left:max(22px,env(safe-area-inset-left));padding-right:max(22px,env(safe-area-inset-right))}
  a{color:var(--link)}
  a:hover{text-decoration-thickness:2px}
  :focus-visible{outline:3px solid var(--accent);outline-offset:2px;border-radius:4px}
  .hero{background:linear-gradient(135deg,#FFC06A,#FF9356 40%,var(--coral) 75%,var(--coral-dark));
    color:#33170C;padding:64px 22px 56px;text-align:center;
    padding-left:max(22px,env(safe-area-inset-left));padding-right:max(22px,env(safe-area-inset-right))}
  .hero .peanut{font-size:60px;line-height:1}
  h1{font-family:Fredoka,sans-serif;font-weight:700;font-size:38px;margin:14px 0 6px;letter-spacing:-.01em}
  .tag{font-size:17px;font-weight:600;margin:0}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:18px;
    padding:22px 24px;margin:34px 0 14px;box-shadow:0 8px 24px rgba(60,50,45,.05);text-align:center}
  @media (prefers-color-scheme:dark){
    .card{box-shadow:0 8px 24px rgba(0,0,0,.35)}
  }
  .card > p{margin:0}
  .mail{display:inline-block;margin-top:14px;background:var(--btn);color:var(--btn-ink);text-decoration:none;
    font-weight:800;padding:12px 22px;border-radius:999px;text-align:center;
    transition:background-color .15s ease,transform .1s ease}
  .mail:hover{background:var(--btn-hover)}
  .mail:active{transform:translateY(1px)}
  footer{text-align:center;color:var(--ink3);font-size:13px;padding:34px 22px 50px;
    padding-left:max(22px,env(safe-area-inset-left));padding-right:max(22px,env(safe-area-inset-right))}
  footer a{color:var(--ink3);display:inline-block;padding:13px 8px;margin:-13px -4px}
</style>
</head>
<body>
  <header class="hero">
    <div class="peanut" aria-hidden="true">🥜</div>
    <h1>Page not found</h1>
    <p class="tag">This page doesn't exist — but Peanut knows the way back.</p>
  </header>

  <main class="wrap">
    <div class="card">
      <p>The address may have been mistyped, or the page may have moved.</p>
      <a class="mail" href="https://jaydencj.github.io/gre-peanut-support/">Go to Support</a>
    </div>
  </main>

  <footer>
    © 2026 GRE Peanut · <a href="https://jaydencj.github.io/gre-peanut-support/">Support</a> · <a href="https://jaydencj.github.io/gre-peanut-support/privacy.html">Privacy Policy</a>
  </footer>
</body>
</html>
